<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Art of N. de Garis Davies</title>
  <style>
    :root {
      --papyrus: #fdf6e3;
      --lapis: #4b6a74;
      --hematite: #8b5c4a;
      --sandstone: #d9c9a3;
      --desert-shadow: rgba(0, 0, 0, 0.06);
      --ink: #2f2f2f;
      --gray: #666;
    }

    body {
      font-family: 'Georgia', serif;
      background-color: var(--papyrus);
      color: var(--ink);
      margin: 0;
      padding: 2rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 2rem;
      color: var(--lapis);
      border-bottom: 2px solid var(--sandstone);
      padding-bottom: 0.5rem;
      letter-spacing: 0.03em;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.8rem;
    }

    .card {
      background-color: #fcfaf5;
      border: 1px solid var(--sandstone);
      border-radius: 8px;
      box-shadow: 0 2px 6px var(--desert-shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
      border-bottom: 1px solid var(--sandstone);
    }

    .card-content {
      padding: 1rem;
      background-color: #fffef9;
    }

    .card-title {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 0.4rem;
      color: var(--hematite);
    }

    .card-description {
      font-size: 0.8rem;
      color: var(--gray);
      line-height: 1.5;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    a:hover .card-title {
      color: var(--lapis);
    }

    a:hover {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>The Art of N. de Garis Davies in the Met</h1>
  <div class="gallery" id="gallery"></div>

  <script>
    let objects = [];

    // const endpoint = 'https://api.sheetbest.com/sheets/f90fc378-8e9a-4850-9783-c500e6b6dbdd';
    const endpoint = "https://opensheet.elk.sh/1Y-Ii7uX6AwUKlT3AJB9g6_FJOUDS2hPGODQH3RFMLZU/1";

    fetch(endpoint)
      .then(response => response.json())
      .then(data => {
        data.forEach(item => {
          objects.push({
            title: item.Title,
            image: item.Image,
            description: item.Description,
            link: item.Link
          });
        });
        renderGallery();
      })
      .catch(error => console.error('Error fetching data:', error));
    
    function renderGallery() {
      const gallery = document.getElementById("gallery");

      objects.forEach(obj => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <a href="${obj.link}" target="_blank">
            <img src="${obj.image}" alt="${obj.title}">
            <div class="card-content">
              <div class="card-title">${obj.title}</div>
              <div class="card-description">${obj.description}</div>
            </div>
          </a>
        `;

        gallery.appendChild(card);
      });
    }
  </script>
</body>
</html>
